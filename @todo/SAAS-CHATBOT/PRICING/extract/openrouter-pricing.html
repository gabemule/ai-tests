<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OpenRouter Pricing Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #e6edf3;
    --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
    --red: #f85149; --purple: #bc8cff;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); }
  header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--panel);
           display: flex; flex-wrap: wrap; align-items: center; gap: 12px; }
  h1 { font-size: 18px; margin: 0; margin-right: auto; }
  .meta { color: var(--muted); font-size: 12px; }
  button { background: #21262d; color: var(--text); border: 1px solid var(--border);
           border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  .controls { padding: 12px 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
              border-bottom: 1px solid var(--border); }
  input[type=search], select { background: #0d1117; color: var(--text); border: 1px solid var(--border);
           border-radius: 6px; padding: 6px 10px; font-size: 13px; }
  input[type=search] { min-width: 220px; }
  .tabs { padding: 12px 20px 0; display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { background: transparent; border: 1px solid var(--border); border-bottom: none;
         border-radius: 6px 6px 0 0; padding: 8px 14px; }
  .tab.active { background: var(--panel); color: var(--accent); }
  .wrap { padding: 0 20px 40px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel);
          border: 1px solid var(--border); border-radius: 0 6px 6px 6px; overflow: hidden; }
  th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #1c2128; cursor: pointer; user-select: none; position: sticky; top: 0; }
  th:hover { color: var(--accent); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover td { background: #1c2128; }
  .badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px 6px;
           border-radius: 10px; margin-left: 4px; vertical-align: middle; }
  .b-new { background: rgba(63,185,80,.15); color: var(--green); border: 1px solid var(--green); }
  .b-promo { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid var(--yellow); }
  .b-watch { background: rgba(188,140,255,.15); color: var(--purple); border: 1px solid var(--purple); }
  .b-tier { background: rgba(88,166,255,.15); color: var(--accent); border: 1px solid var(--accent); }
  .bucket { font-size: 11px; padding: 1px 8px; border-radius: 10px; white-space: nowrap; }
  .bk-frontier { background: rgba(248,81,73,.15); color: var(--red); }
  .bk-premium  { background: rgba(210,153,34,.15); color: var(--yellow); }
  .bk-workhorse{ background: rgba(88,166,255,.15); color: var(--accent); }
  .bk-economy  { background: rgba(63,185,80,.15); color: var(--green); }
  .bk-free     { background: rgba(139,148,158,.15); color: var(--muted); }
  .id { color: var(--muted); font-size: 12px; }
  .empty { padding: 40px; text-align: center; color: var(--muted); }
  code { background: #0d1117; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }
  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border);
           border-radius: 8px; max-width: 560px; }
  dialog::backdrop { background: rgba(0,0,0,.6); }
</style>
</head>
<body>
<header>
  <h1>OpenRouter Pricing</h1>
  <span class="meta" id="meta">loading…</span>
  <button id="reload">↻ Reload</button>
</header>

<div class="tabs" id="tabs"></div>

<div class="controls">
  <input type="search" id="q" placeholder="Search id / name…" />
  <select id="provider"><option value="">All providers</option></select>
  <select id="bucket">
    <option value="">All price buckets</option>
    <option value="frontier">Frontier (&gt;$5)</option>
    <option value="premium">Premium ($2–5)</option>
    <option value="workhorse">Workhorse ($0.5–2)</option>
    <option value="economy">Economy (&lt;$0.5)</option>
    <option value="free">Free ($0)</option>
  </select>
  <button id="onlyWatch">★ Watchlist</button>
  <button id="onlyNew">● NEW</button>
  <button id="onlyPromo">● PROMO</button>
  <span class="meta" id="count"></span>
</div>

<div class="wrap"><div id="view"></div></div>

<dialog id="reloadDlg">
  <h3>Reload data</h3>
  <p>The browser can't run <code>curl</code>. Re-fetch live prices from a terminal:</p>
  <p><code>bash fetch-openrouter-pricing.sh</code></p>
  <p class="meta">That rewrites <code>openrouter-pricing.json</code> (and saves a dated snapshot).
     Then refresh this page.</p>
  <form method="dialog"><button>Got it</button></form>
</dialog>

<!-- Data companion (generated by fetch-openrouter-pricing.sh). Loaded via <script src> so the
     page works straight from file:// — a file:// fetch() is blocked by CORS. -->
<script src="openrouter-pricing.js" onerror="window.__noDataJs=true"></script>
<script>
const TABS = [

  { key: "all_models",        label: "All models" },
  { key: "project_models",    label: "Our models" },
  { key: "programming_top20", label: "Top-20 coding" },
  { key: "newest",            label: "Newest" },
  { key: "embeddings_all",    label: "Embeddings" },
];
let DATA = {}, tab = "all_models", sortKey = "avg_per_1m", sortDir = 1;
const filters = { q: "", provider: "", bucket: "", watch: false, isNew: false, promo: false };

const fmt = n => n == null ? "—" : "$" + (n < 1 ? n.toFixed(4) : n.toFixed(2));
const fmtCtx = n => n == null ? "—" : n >= 1000 ? (n/1000).toFixed(0) + "K" : String(n);
const fmtDate = ts => ts ? new Date(ts*1000).toISOString().slice(0,10) : "—";
function bucketOf(avg) {
  if (avg == null) return null;
  if (avg === 0) return "free";
  if (avg > 5) return "frontier";
  if (avg >= 2) return "premium";
  if (avg >= 0.5) return "workhorse";
  return "economy";
}
const BUCKET_LABEL = { frontier: "Frontier", premium: "Premium", workhorse: "Workhorse",
                       economy: "Economy", free: "Free" };

async function load() {
  // Prefer the JS companion (works from file://). Fall back to fetch() when served over http(s).
  if (window.OPENROUTER_DATA) {
    DATA = window.OPENROUTER_DATA;
  } else {
    try {
      const res = await fetch("openrouter-pricing.json?_=" + Date.now());
      DATA = await res.json();
    } catch (e) {
      document.getElementById("meta").textContent =
        "⚠ could not load data — run `bash fetch-openrouter-pricing.sh` (generates the .js + .json), then refresh";
      return;
    }
  }

  const c = DATA.counts || {};
  document.getElementById("meta").textContent =
    `fetched ${DATA.fetched_at || "?"} · ${c.all||0} models · ${c.embeddings||0} embeddings` +
    (DATA.has_baseline ? "" : " · (no diff baseline yet)");
  buildProviders();
  render();
}

function buildTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = "";
  TABS.forEach(t => {
    const b = document.createElement("button");
    b.className = "tab" + (t.key === tab ? " active" : "");
    b.textContent = t.label;
    b.onclick = () => { tab = t.key; buildTabs(); render(); };
    el.appendChild(b);
  });
}

function buildProviders() {
  const set = new Set();
  (DATA.all_models || []).forEach(m => set.add((m.id || "").split("/")[0]));
  const sel = document.getElementById("provider");
  [...set].filter(Boolean).sort().forEach(p => {
    const o = document.createElement("option"); o.value = p; o.textContent = p; sel.appendChild(o);
  });
}

function rows() {
  let r = (DATA[tab] || []).slice();
  if (filters.q) {
    const q = filters.q.toLowerCase();
    r = r.filter(m => (m.id+" "+(m.name||"")).toLowerCase().includes(q));
  }
  if (filters.provider) r = r.filter(m => (m.id||"").split("/")[0] === filters.provider);
  if (filters.bucket)   r = r.filter(m => bucketOf(m.avg_per_1m) === filters.bucket);
  if (filters.watch)    r = r.filter(m => m.watchlist);
  if (filters.isNew)    r = r.filter(m => m.is_new);
  if (filters.promo)    r = r.filter(m => m.is_promo);
  r.sort((a,b) => {
    let x = a[sortKey], y = b[sortKey];
    if (x == null) x = -Infinity; if (y == null) y = -Infinity;
    if (typeof x === "string") return x.localeCompare(y) * sortDir;
    return (x - y) * sortDir;
  });
  return r;
}

function render() {
  buildTabs();
  const cols = [
    { k: "name", label: "Model" },
    { k: "_bucket", label: "Bucket", num: false },
    { k: "in_per_1m", label: "In /1M", num: true },
    { k: "out_per_1m", label: "Out /1M", num: true },
    { k: "avg_per_1m", label: "Avg /1M", num: true },
    { k: "ctx", label: "Ctx", num: true },
    { k: "created", label: "Released", num: true },
  ];
  const data = rows();
  document.getElementById("count").textContent = `${data.length} shown`;
  if (!data.length) { document.getElementById("view").innerHTML = '<div class="empty">No models match the filters.</div>'; return; }

  let html = "<table><thead><tr>";
  cols.forEach(c => {
    const arrow = sortKey === c.k ? (sortDir === 1 ? " ▲" : " ▼") : "";
    html += `<th class="${c.num?'num':''}" data-k="${c.k}">${c.label}${arrow}</th>`;
  });
  html += "</tr></thead><tbody>";
  data.forEach(m => {
    const bk = bucketOf(m.avg_per_1m);
    html += "<tr>";
    html += `<td><strong>${m.name || m.id}</strong><br><span class="id">${m.id}</span>` +
            badges(m) + `</td>`;
    html += `<td>${bk ? `<span class="bucket bk-${bk}">${BUCKET_LABEL[bk]}</span>` : "—"}</td>`;
    html += `<td class="num">${fmt(m.in_per_1m)}</td>`;
    html += `<td class="num">${fmt(m.out_per_1m)}</td>`;
    html += `<td class="num"><strong>${fmt(m.avg_per_1m)}</strong></td>`;
    html += `<td class="num">${fmtCtx(m.ctx)}</td>`;
    html += `<td class="num">${fmtDate(m.created)}</td>`;
    html += "</tr>";
  });
  html += "</tbody></table>";
  document.getElementById("view").innerHTML = html;
  document.querySelectorAll("th[data-k]").forEach(th => {
    th.onclick = () => {
      const k = th.dataset.k === "_bucket" ? "avg_per_1m" : th.dataset.k;
      if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
      render();
    };
  });
}

function badges(m) {
  let b = "";
  if (m.tier)      b += `<span class="badge b-tier">${m.tier}</span>`;
  if (m.watchlist) b += `<span class="badge b-watch">★</span>`;
  if (m.is_new)    b += `<span class="badge b-new">NEW</span>`;
  if (m.is_promo)  b += `<span class="badge b-promo">PROMO</span>`;
  return b;
}

document.getElementById("q").oninput        = e => { filters.q = e.target.value; render(); };
document.getElementById("provider").onchange = e => { filters.provider = e.target.value; render(); };
document.getElementById("bucket").onchange   = e => { filters.bucket = e.target.value; render(); };
document.getElementById("onlyWatch").onclick = e => { filters.watch = !filters.watch; e.target.classList.toggle("active"); render(); };
document.getElementById("onlyNew").onclick   = e => { filters.isNew = !filters.isNew; e.target.classList.toggle("active"); render(); };
document.getElementById("onlyPromo").onclick = e => { filters.promo = !filters.promo; e.target.classList.toggle("active"); render(); };
document.getElementById("reload").onclick    = () => document.getElementById("reloadDlg").showModal();

load();
</script>
</body>
</html>
