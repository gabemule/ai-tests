<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estimation Framework</title>
<style>
  :root {
    --bg: #0f1620;
    --bg-2: #16202e;
    --bg-3: #1c2838;
    --panel: #1a2433;
    --border: #2a3a4f;
    --border-soft: #233146;
    --text: #d6e0ec;
    --text-dim: #8a9bb0;
    --text-faint: #5d6e83;
    --accent: #4f8cff;
    --accent-dim: #2f4a78;
    --danger: #e06b6b;
    --pessimista: #e0795b;
    --realista: #4f8cff;
    --otimista: #4fcf91;
    --dot-empty: #243245;
    --shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
  }

  body {
    background:
      radial-gradient(1200px 600px at 80% -10%, #18283c 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #15202f 0%, transparent 55%),
      var(--bg);
    min-height: 100vh;
  }

  .app {
    max-width: 1320px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  .app.wide { max-width: none; }

  /* ===== Header ===== */
  header.topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-right: auto;
  }
  .brand .title {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    font-weight: 600;
  }
  .project-name {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 22px;
    font-weight: 700;
    padding: 2px 4px;
    border-radius: 6px;
    outline: none;
    min-width: 260px;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .project-name:hover { background: var(--bg-3); }
  .project-name:focus {
    background: var(--bg-3);
    box-shadow: inset 0 0 0 1px var(--accent-dim);
  }

  .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  button.btn {
    background: var(--bg-3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.15s, border-color 0.15s, transform 0.05s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  button.btn:hover { background: #233246; border-color: #34496a; }
  button.btn:active { transform: translateY(1px); }
  button.btn.primary { background: var(--accent-dim); border-color: #3a5b94; }
  button.btn.primary:hover { background: #355184; }
  button.btn.ghost { background: transparent; }

  .config-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    user-select: none;
  }
  .config-toggle input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }

  /* ===== Week controls ===== */
  .weekbar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    flex-wrap: wrap;
  }
  .weekbar .label { color: var(--text-dim); font-weight: 600; }
  .stepper { display: inline-flex; align-items: center; gap: 6px; }
  .stepper button {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--bg-3);
    color: var(--text);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
  }
  .stepper button:hover { background: #233246; }
  .stepper .count { min-width: 30px; text-align: center; font-weight: 700; font-size: 16px; }
  .legend { display: flex; gap: 16px; margin-left: auto; flex-wrap: wrap; }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 12px; }
  .legend .swatch { width: 12px; height: 12px; border-radius: 3px; }

  /* ===== Schedule ===== */
  .schedule {
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    margin-bottom: 22px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .schedule-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    border-left: 4px solid var(--sched-color, var(--accent));
  }
  .schedule-head .name {
    font-size: 16px;
    font-weight: 700;
    color: var(--sched-color, var(--text));
  }
  .schedule-head .sched-total {
    margin-left: auto;
    display: flex;
    gap: 18px;
    color: var(--text-dim);
    font-size: 13px;
  }
  .schedule-head .sched-total b { color: var(--text); font-size: 15px; }

  .grid-scroll { overflow-x: auto; }
  table.grid {
    border-collapse: collapse;
    width: 100%;
    min-width: max-content;
  }
  table.grid th, table.grid td { padding: 0; }

  .col-task { position: sticky; left: 0; z-index: 2; }

  thead .week-th {
    text-align: center;
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 600;
    padding: 8px 0 6px;
    border-left: 1px solid var(--border-soft);
    background: var(--bg-2);
    white-space: nowrap;
  }
  thead .corner, thead .total-th {
    background: var(--bg-2);
    border-bottom: 1px solid var(--border-soft);
  }
  thead .corner {
    text-align: left;
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 600;
    padding: 8px 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 220px;
  }
  thead .total-th {
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 14px;
    text-align: right;
    white-space: nowrap;
  }

  tbody tr { border-top: 1px solid var(--border-soft); }
  tbody .task-cell {
    background: var(--bg-2);
    padding: 8px 10px 8px 14px;
    min-width: 220px;
    max-width: 260px;
  }
  .task-inner { display: flex; align-items: center; gap: 8px; }
  .row-drag {
    color: var(--text-faint);
    cursor: grab;
    font-size: 14px;
    line-height: 1;
    padding: 2px 2px;
    flex-shrink: 0;
    user-select: none;
    opacity: 0.5;
    transition: opacity 0.12s, color 0.12s;
  }
  tbody tr:hover .row-drag { opacity: 1; }
  .row-drag:hover { color: var(--text); }
  .row-drag:active { cursor: grabbing; }
  tbody tr.dragging { opacity: 0.4; }
  tbody tr.drop-before .task-cell { box-shadow: inset 0 2px 0 0 var(--accent); }
  tbody tr.drop-after .task-cell { box-shadow: inset 0 -2px 0 0 var(--accent); }
  .row-color {
    width: 14px; height: 14px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0;
    cursor: pointer;
    flex-shrink: 0;
    appearance: none;
    -webkit-appearance: none;
    background: none;
  }
  .row-color::-webkit-color-swatch-wrapper { padding: 0; }
  .row-color::-webkit-color-swatch { border: none; border-radius: 3px; }
  .row-name {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    outline: none;
    flex: 1;
    min-width: 0;
    padding: 3px 4px;
    border-radius: 5px;
  }
  .row-name:hover { background: var(--bg-3); }
  .row-name:focus { background: var(--bg-3); box-shadow: inset 0 0 0 1px var(--accent-dim); }
  .row-del {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 15px;
    padding: 2px 6px;
    border-radius: 5px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s, background 0.12s;
  }
  tbody tr:hover .row-del { opacity: 1; }
  .row-del:hover { color: var(--danger); background: rgba(224,107,107,0.12); }

  .week-cell {
    border-left: 1px solid var(--border-soft);
    padding: 7px 0;
  }
  .week-dots {
    display: flex;
    gap: 4px;
    justify-content: center;
    padding: 0 7px;
  }
  .dot {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: var(--dot-empty);
    cursor: pointer;
    transition: transform 0.05s, background 0.1s, box-shadow 0.1s;
    flex-shrink: 0;
  }
  .dot:hover { transform: scale(1.18); }
  .dot.on {
    background: var(--row-color, var(--accent));
    box-shadow: 0 0 0 1px rgba(255,255,255,0.12), 0 0 8px -2px var(--row-color, var(--accent));
  }

  .row-total {
    background: var(--bg-2);
    text-align: right;
    padding: 8px 14px;
    white-space: nowrap;
    color: var(--text-dim);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .row-total b { color: var(--text); }

  .add-row-bar { padding: 12px 16px; border-top: 1px solid var(--border-soft); }
  .add-row-btn {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    width: 100%;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .add-row-btn:hover { border-color: var(--accent-dim); color: var(--text); background: var(--bg-3); }

  .empty-hint {
    color: var(--text-faint);
    font-size: 13px;
    text-align: center;
    padding: 18px;
  }

  .week-sep { box-shadow: inset 2px 0 0 -1px var(--border); }

  footer.foot {
    text-align: center;
    color: var(--text-faint);
    font-size: 12px;
    margin-top: 30px;
  }

  input[type="file"] { display: none; }
  .toast {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 9px;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 50;
    font-size: 13px;
    font-weight: 600;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="title">Estimation Framework</span>
      <input id="projectName" class="project-name" type="text" placeholder="Nome do projeto" />
    </div>
    <div class="toolbar">
      <label class="config-toggle" title="Quando ligado, linhas são iguais nos 3 cronogramas">
        <input type="checkbox" id="syncRows" checked />
        Linhas sincronizadas
      </label>
      <button class="btn ghost" id="clearBtn">🗑 Limpar</button>
      <button class="btn ghost" id="importBtn">⬆ Importar JSON</button>
      <button class="btn primary" id="exportBtn">⬇ Exportar JSON</button>
      <input type="file" id="importFile" accept="application/json,.json" />
      <button class="btn ghost" id="widthBtn" title="Alternar largura total / contida">⛶</button>
    </div>
  </header>

  <div class="weekbar">
    <span class="label">Semanas</span>
    <div class="stepper">
      <button id="weekMinus" title="Remover semana">−</button>
      <span class="count" id="weekCount">0</span>
      <button id="weekPlus" title="Adicionar semana">+</button>
    </div>
    <span class="label" style="color:var(--text-faint);font-weight:500;">cada coluna = 1 semana = 5 dias úteis</span>
    <div class="legend">
      <span class="item"><span class="swatch" style="background:var(--pessimista)"></span>Pessimista</span>
      <span class="item"><span class="swatch" style="background:var(--realista)"></span>Realista</span>
      <span class="item"><span class="swatch" style="background:var(--otimista)"></span>Otimista</span>
    </div>
  </div>

  <div id="schedules"></div>

  <footer class="foot">Dados salvos automaticamente neste navegador · Exporte um JSON para compartilhar.</footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================================================================
 * Estimation Framework — single-file app
 * Sections: constants · state · persistence · model ops · render · events
 * ========================================================================= */

// ---- constants ----
const STORAGE_KEY = "estimation-framework:v1";
const WIDE_KEY = "estimation-framework:wide";
const DAYS_PER_WEEK = 5;
const SCHEDULES = [
  { key: "pessimista", label: "Pessimista", color: "var(--pessimista)" },
  { key: "realista",   label: "Realista",   color: "var(--realista)" },
  { key: "otimista",   label: "Otimista",   color: "var(--otimista)" },
];
const ROW_COLORS = ["#4f8cff", "#4fcf91", "#e0795b", "#c77dff", "#f0c14b", "#5bd1e0", "#e06b9b"];

// ---- state ----
let state = null;

function defaultState() {
  const mkRow = (id, name, color) => ({ id, name, color });
  const rows = [
    mkRow("r1", "Setup de Projeto", ROW_COLORS[0]),
    mkRow("r2", "Início Dev A", ROW_COLORS[1]),
    mkRow("r3", "Início Dev B", ROW_COLORS[2]),
    mkRow("r4", "Integração AB", ROW_COLORS[3]),
    mkRow("r5", "QA", ROW_COLORS[4]),
  ];
  return {
    version: 1,
    projectName: "Meu Projeto",
    weeks: 6,
    daysPerWeek: DAYS_PER_WEEK,
    syncRows: true,
    rows,
    schedules: {
      pessimista: { marks: {} },
      realista: { marks: {} },
      otimista: { marks: {} },
    },
  };
}

// ---- helpers ----
function uid() { return "r" + Math.random().toString(36).slice(2, 9); }
function totalDays() { return state.weeks * state.daysPerWeek; }
function fmtWeeks(days) {
  const w = days / state.daysPerWeek;
  return (Math.round(w * 10) / 10).toString().replace(".", ",");
}
function nextColor() {
  const used = state.rows.map(r => r.color);
  return ROW_COLORS.find(c => !used.includes(c)) || ROW_COLORS[state.rows.length % ROW_COLORS.length];
}
function getMarks(schedKey, rowId) {
  const m = state.schedules[schedKey].marks;
  if (!m[rowId]) m[rowId] = [];
  return m[rowId];
}

// ---- persistence ----
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.warn("save failed", e); }
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    return normalize(parsed);
  } catch (e) { console.warn("load failed", e); return null; }
}

// Ensure a parsed/imported object has all required fields and valid mark indices.
function normalize(obj) {
  if (!obj || typeof obj !== "object") return null;
  const s = defaultState();
  s.projectName = typeof obj.projectName === "string" ? obj.projectName : s.projectName;
  s.weeks = Number.isInteger(obj.weeks) && obj.weeks > 0 ? obj.weeks : s.weeks;
  s.daysPerWeek = DAYS_PER_WEEK;
  s.syncRows = typeof obj.syncRows === "boolean" ? obj.syncRows : true;
  if (Array.isArray(obj.rows) && obj.rows.length) {
    s.rows = obj.rows
      .filter(r => r && typeof r.name === "string")
      .map(r => ({ id: r.id || uid(), name: r.name, color: r.color || ROW_COLORS[0] }));
  }
  const maxDay = s.weeks * s.daysPerWeek - 1;
  const validIds = new Set(s.rows.map(r => r.id));
  s.schedules = { pessimista: { marks: {} }, realista: { marks: {} }, otimista: { marks: {} } };
  for (const sk of Object.keys(s.schedules)) {
    const src = obj.schedules && obj.schedules[sk] && obj.schedules[sk].marks;
    if (src && typeof src === "object") {
      for (const rid of Object.keys(src)) {
        if (!validIds.has(rid)) continue;
        const arr = Array.isArray(src[rid]) ? src[rid] : [];
        s.schedules[sk].marks[rid] = [...new Set(arr.filter(i => Number.isInteger(i) && i >= 0 && i <= maxDay))].sort((a, b) => a - b);
      }
    }
  }
  return s;
}

// ---- model ops ----
function addRow() {
  const row = { id: uid(), name: "Nova etapa", color: nextColor() };
  state.rows.push(row);
  commit();
}
function removeRow(rowId) {
  state.rows = state.rows.filter(r => r.id !== rowId);
  for (const sk of Object.keys(state.schedules)) delete state.schedules[sk].marks[rowId];
  commit();
}
function renameRow(rowId, name) {
  const r = state.rows.find(r => r.id === rowId);
  if (r) { r.name = name; save(); }
}
function recolorRow(rowId, color) {
  const r = state.rows.find(r => r.id === rowId);
  if (r) { r.color = color; commit(); }
}
function setWeeks(n) {
  n = Math.max(1, Math.min(104, n));
  state.weeks = n;
  const maxDay = n * state.daysPerWeek - 1;
  for (const sk of Object.keys(state.schedules)) {
    const m = state.schedules[sk].marks;
    for (const rid of Object.keys(m)) m[rid] = m[rid].filter(i => i <= maxDay);
  }
  commit();
}
function toggleDay(schedKey, rowId, dayIdx, force) {
  const marks = getMarks(schedKey, rowId);
  const has = marks.includes(dayIdx);
  const shouldOn = force === undefined ? !has : force;
  if (shouldOn && !has) marks.push(dayIdx);
  else if (!shouldOn && has) marks.splice(marks.indexOf(dayIdx), 1);
}
// Reorder rows array by id (reflects across all 3 schedules; marks are keyed by id).
function moveRow(fromId, toId, after) {
  if (fromId === toId) return;
  const from = state.rows.findIndex(r => r.id === fromId);
  if (from === -1) return;
  const [moved] = state.rows.splice(from, 1);
  let to = state.rows.findIndex(r => r.id === toId);
  if (to === -1) { state.rows.splice(from, 0, moved); return; }
  if (after) to += 1;
  state.rows.splice(to, 0, moved);
  commit();
}

// Wire native HTML5 drag-and-drop on a row <tr> for reordering.
// Painting dots uses mouse events on .dot; DnD is gated by enabling
// tr.draggable only while the handle is grabbed (see renderRow).
let draggedRowId = null;
function attachRowDnD(tr, rowId) {
  tr.addEventListener("dragstart", e => {
    draggedRowId = rowId;
    tr.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    try { e.dataTransfer.setData("text/plain", rowId); } catch (_) {}
  });
  tr.addEventListener("dragover", e => {
    if (draggedRowId === null || draggedRowId === rowId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = "move";
    const rect = tr.getBoundingClientRect();
    const after = e.clientY > rect.top + rect.height / 2;
    tr.classList.toggle("drop-after", after);
    tr.classList.toggle("drop-before", !after);
  });
  tr.addEventListener("dragleave", () => {
    tr.classList.remove("drop-before", "drop-after");
  });
  tr.addEventListener("drop", e => {
    e.preventDefault();
    const after = tr.classList.contains("drop-after");
    tr.classList.remove("drop-before", "drop-after");
    if (draggedRowId !== null) moveRow(draggedRowId, rowId, after);
  });
  tr.addEventListener("dragend", () => {
    tr.draggable = false;
    tr.classList.remove("dragging", "drop-before", "drop-after");
    draggedRowId = null;
  });
}

function commit() { save(); render(); }


// ---- totals ----
function rowDays(schedKey, rowId) { return getMarks(schedKey, rowId).length; }
function schedDays(schedKey) {
  return state.rows.reduce((sum, r) => sum + rowDays(schedKey, r.id), 0);
}

// =========================================================================
// RENDER
// =========================================================================
function render() {
  document.getElementById("projectName").value = state.projectName;
  document.getElementById("syncRows").checked = state.syncRows;
  document.getElementById("weekCount").textContent = state.weeks;

  const container = document.getElementById("schedules");
  container.innerHTML = "";
  for (const sched of SCHEDULES) container.appendChild(renderSchedule(sched));
}

function renderSchedule(sched) {
  const wrap = document.createElement("div");
  wrap.className = "schedule";
  wrap.style.setProperty("--sched-color", sched.color);

  // head
  const head = document.createElement("div");
  head.className = "schedule-head";
  const totDays = schedDays(sched.key);
  head.innerHTML = `
    <span class="name">${sched.label}</span>
    <span class="sched-total">
      <span><b>${totDays}</b> dias úteis</span>
      <span><b>${fmtWeeks(totDays)}</b> semanas</span>
    </span>`;
  wrap.appendChild(head);

  // grid
  const scroll = document.createElement("div");
  scroll.className = "grid-scroll";
  const table = document.createElement("table");
  table.className = "grid";

  // head row
  const thead = document.createElement("thead");
  const htr = document.createElement("tr");
  htr.innerHTML = `<th class="corner col-task">Etapa</th>`;
  for (let w = 0; w < state.weeks; w++) {
    htr.innerHTML += `<th class="week-th">S${w + 1}</th>`;
  }
  htr.innerHTML += `<th class="total-th">Total</th>`;
  thead.appendChild(htr);
  table.appendChild(thead);

  // body
  const tbody = document.createElement("tbody");
  if (state.rows.length === 0) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = state.weeks + 2;
    td.className = "empty-hint";
    td.textContent = "Nenhuma etapa ainda. Adicione uma abaixo.";
    tr.appendChild(td);
    tbody.appendChild(tr);
  } else {
    for (const row of state.rows) tbody.appendChild(renderRow(sched, row));
  }
  table.appendChild(tbody);
  scroll.appendChild(table);
  wrap.appendChild(scroll);

  // add-row bar
  const bar = document.createElement("div");
  bar.className = "add-row-bar";
  const addBtn = document.createElement("button");
  addBtn.className = "add-row-btn";
  addBtn.textContent = "+ Adicionar etapa";
  addBtn.addEventListener("click", addRow);
  bar.appendChild(addBtn);
  wrap.appendChild(bar);

  return wrap;
}

function renderRow(sched, row) {
  const tr = document.createElement("tr");
  tr.dataset.rowId = row.id;

  // task cell
  const taskTd = document.createElement("td");
  taskTd.className = "task-cell col-task";
  const inner = document.createElement("div");
  inner.className = "task-inner";

  const drag = document.createElement("span");
  drag.className = "row-drag";
  drag.innerHTML = "⠿";
  drag.title = "Arraste para reordenar";
  // Enable native DnD on the row only while grabbing the handle
  drag.addEventListener("mousedown", () => { tr.draggable = true; });
  drag.addEventListener("mouseup", () => { tr.draggable = false; });

  const color = document.createElement("input");
  color.type = "color";
  color.className = "row-color";
  color.value = row.color;
  color.title = "Cor da etapa";
  color.addEventListener("input", e => recolorRow(row.id, e.target.value));

  const name = document.createElement("input");
  name.type = "text";
  name.className = "row-name";
  name.value = row.name;
  name.addEventListener("input", e => renameRow(row.id, e.target.value));
  name.addEventListener("blur", () => render());

  const del = document.createElement("button");
  del.className = "row-del";
  del.innerHTML = "🗑";
  del.title = "Remover etapa";
  del.addEventListener("click", () => removeRow(row.id));

  inner.append(drag, color, name, del);
  taskTd.appendChild(inner);
  tr.appendChild(taskTd);

  attachRowDnD(tr, row.id);

  // week cells
  const marks = getMarks(sched.key, row.id);
  const markSet = new Set(marks);
  for (let w = 0; w < state.weeks; w++) {
    const td = document.createElement("td");
    td.className = "week-cell week-sep";
    const dots = document.createElement("div");
    dots.className = "week-dots";
    for (let d = 0; d < state.daysPerWeek; d++) {
      const dayIdx = w * state.daysPerWeek + d;
      const dot = document.createElement("div");
      dot.className = "dot" + (markSet.has(dayIdx) ? " on" : "");
      dot.style.setProperty("--row-color", row.color);
      dot.dataset.sched = sched.key;
      dot.dataset.row = row.id;
      dot.dataset.day = dayIdx;
      dots.appendChild(dot);
    }
    td.appendChild(dots);
    tr.appendChild(td);
  }

  // total cell
  const totTd = document.createElement("td");
  totTd.className = "row-total";
  const d = rowDays(sched.key, row.id);
  totTd.innerHTML = `<b>${d}</b>d · ${fmtWeeks(d)}sem`;
  tr.appendChild(totTd);

  return tr;
}

// =========================================================================
// EVENTS
// =========================================================================
// Drag-to-paint marking (delegated on document)
let dragging = false;
let dragForce = null; // true=paint, false=clear

function dotFromEvent(e) {
  const el = e.target.closest(".dot");
  return el && el.dataset.day !== undefined ? el : null;
}
function applyDot(el) {
  toggleDay(el.dataset.sched, el.dataset.row, Number(el.dataset.day), dragForce);
  // live visual update without full re-render
  if (dragForce) el.classList.add("on"); else el.classList.remove("on");
}

document.addEventListener("mousedown", e => {
  const el = dotFromEvent(e);
  if (!el) return;
  e.preventDefault();
  dragging = true;
  const isOn = el.classList.contains("on");
  dragForce = !isOn; // first cell decides: if was off → paint, if on → clear
  applyDot(el);
});
document.addEventListener("mouseover", e => {
  if (!dragging) return;
  const el = dotFromEvent(e);
  if (el) applyDot(el);
});
document.addEventListener("mouseup", () => {
  if (!dragging) return;
  dragging = false;
  dragForce = null;
  commit(); // persist + recompute totals
});

// Header / toolbar events
document.getElementById("projectName").addEventListener("input", e => {
  state.projectName = e.target.value; save();
});
document.getElementById("syncRows").addEventListener("change", e => {
  state.syncRows = e.target.checked; save();
});
document.getElementById("weekPlus").addEventListener("click", () => setWeeks(state.weeks + 1));
document.getElementById("weekMinus").addEventListener("click", () => setWeeks(state.weeks - 1));

// Width toggle — full-width vs contained (UI preference, not exported)
function applyWide(wide) {
  document.querySelector(".app").classList.toggle("wide", wide);
}
document.getElementById("widthBtn").addEventListener("click", () => {
  const wide = !document.querySelector(".app").classList.contains("wide");
  applyWide(wide);
  try { localStorage.setItem(WIDE_KEY, wide ? "1" : "0"); } catch (e) {}
});

// Clear — reset everything to a clean default state
document.getElementById("clearBtn").addEventListener("click", () => {
  if (!confirm("Limpar tudo e recomeçar? Esta ação não pode ser desfeita.")) return;
  state = defaultState();
  commit();
  toast("Estado limpo");
});

// Export
document.getElementById("exportBtn").addEventListener("click", () => {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const safe = (state.projectName || "cronograma").trim().replace(/[^\w\-]+/g, "_").toLowerCase();
  a.href = url;
  a.download = `${safe || "cronograma"}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast("JSON exportado");
});

// Import
document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});
document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      const next = normalize(obj);
      if (!next) throw new Error("formato inválido");
      state = next;
      commit();
      toast("JSON importado");
    } catch (err) {
      toast("Erro ao importar: " + err.message);
    }
    e.target.value = "";
  };
  reader.readAsText(file);
});

// Toast
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

// =========================================================================
// INIT
// =========================================================================
state = load() || defaultState();
applyWide(localStorage.getItem(WIDE_KEY) === "1");
render();
</script>
</body>
</html>
